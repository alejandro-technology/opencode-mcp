<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="640" height="640" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <style>
      .box { fill: #1e293b; stroke: #475569; stroke-width: 1.5; rx: 12; }
      .box-accent { fill: #1d4ed8; stroke: #3b82f6; stroke-width: 1.5; rx: 12; }
      .box-sub { fill: #0f172a; stroke: #334155; stroke-width: 1.5; rx: 10; }
      .title { fill: #f8fafc; font-size: 17px; font-weight: 600; }
      .subtitle { fill: #cbd5e1; font-size: 12.5px; }
      .label { fill: #94a3b8; font-size: 12px; }
      .arrow-line { stroke: #6b7280; stroke-width: 1.5; marker-end: url(#arrow); }
      @media (prefers-color-scheme: light) {
        .box { fill: #f1f5f9; stroke: #cbd5e1; }
        .box-sub { fill: #ffffff; stroke: #e2e8f0; }
        .title { fill: #0f172a; }
        .subtitle { fill: #475569; }
        .label { fill: #64748b; }
      }
    </style>
  </defs>

  <rect width="640" height="640" fill="none"/>

  <!-- Claude Code -->
  <rect class="box-accent" x="170" y="20" width="300" height="70"/>
  <text class="title" x="320" y="47" text-anchor="middle" font-size="15">Claude Code / Codex / Cursor</text>
  <text class="subtitle" x="320" y="70" text-anchor="middle" fill="#dbeafe">orquestador</text>

  <line class="arrow-line" x1="320" y1="90" x2="320" y2="150"/>

  <!-- opencode-mcp -->
  <rect class="box" x="170" y="150" width="300" height="70"/>
  <text class="title" x="320" y="180" text-anchor="middle">opencode-mcp</text>
  <text class="subtitle" x="320" y="200" text-anchor="middle">servidor MCP</text>

  <line class="arrow-line" x1="320" y1="220" x2="320" y2="280"/>

  <!-- OpenCode SDK / CLI -->
  <rect class="box" x="170" y="280" width="300" height="70"/>
  <text class="title" x="320" y="310" text-anchor="middle">OpenCode SDK / CLI</text>
  <text class="subtitle" x="320" y="330" text-anchor="middle">createOpencodeServer / Client</text>

  <line class="arrow-line" x1="320" y1="350" x2="320" y2="400"/>

  <!-- label above subagents -->
  <text class="label" x="320" y="425" text-anchor="middle">tareas delegadas, en paralelo</text>

  <!-- Subagents row -->
  <rect class="box-sub" x="40" y="440" width="130" height="80"/>
  <text class="title" x="105" y="475" text-anchor="middle" font-size="14">Kimi</text>
  <text class="label" x="105" y="495" text-anchor="middle">subagente A</text>

  <rect class="box-sub" x="190" y="440" width="130" height="80"/>
  <text class="title" x="255" y="475" text-anchor="middle" font-size="14">Qwen</text>
  <text class="label" x="255" y="495" text-anchor="middle">subagente B</text>

  <rect class="box-sub" x="340" y="440" width="130" height="80"/>
  <text class="title" x="405" y="475" text-anchor="middle" font-size="14">GLM</text>
  <text class="label" x="405" y="495" text-anchor="middle">subagente C</text>

  <rect class="box-sub" x="490" y="440" width="130" height="80"/>
  <text class="title" x="555" y="475" text-anchor="middle" font-size="14">DeepSeek</text>
  <text class="label" x="555" y="495" text-anchor="middle">subagente D</text>

  <!-- connectors from OpenCode to each subagent -->
  <path class="arrow-line" d="M320,350 Q320,400 105,440" fill="none"/>
  <path class="arrow-line" d="M320,350 Q320,400 255,440" fill="none"/>
  <path class="arrow-line" d="M320,350 Q320,400 405,440" fill="none"/>
  <path class="arrow-line" d="M320,350 Q320,400 555,440" fill="none"/>

  <!-- footer note -->
  <text class="label" x="320" y="580" text-anchor="middle" font-size="12.5">cada tarea corre en su propia sesión aislada de OpenCode</text>
</svg>
